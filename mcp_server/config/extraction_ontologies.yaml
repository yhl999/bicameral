schema_version: "2026-02-17"

om_extractor:
  model_id: "gpt-5.1-codex-mini"
  prompt_template: |-
    You are the Observational Memory extractor.
    Produce deterministic mutation candidates from transcript chunks.
    Preserve source provenance and avoid speculative claims.

# Lane-Specific Extraction Ontologies
#
# Maps group_id → entity types, relationship types, and extraction emphasis.
# Adding a new lane requires ONLY a new block here — zero code changes.
#
# Schema per lane:
#   <group_id>:
#     entity_types:
#       - name: <EntityTypeName>
#         description: <what the LLM should extract>
#     relationship_types:
#       - name: <RELATIONSHIP_NAME>
#         description: <meaning>
#     extraction_emphasis: <prompt hint guiding the LLM's focus>

# ─────────────────────────────────────────────
# Content Inspiration — Short-Form
# ─────────────────────────────────────────────
s1_inspiration_short_form:
  extraction_mode: constrained_soft
  intent_guidance: >-
    Focus on short-form craft that is immediately reusable: hooks, compression, punchlines,
    engagement triggers, and sequencing.
    Every extraction must root from exactly one ShortFormPiece anchor node per episode,
    and all relationship edges must originate from that anchor.
    Evidence requirement: every emitted RhetoricalMove, HookPattern, VoiceQuality, and
    CompressionTechnique must be supported by a concrete phrase/pattern in the source
    text (quoted span or clearly paraphrased observable move), and include
    evidence_span + craft_type + pattern_template + when_to_use fields.
    Anti-abstraction rule: do not emit generic tone labels without a concrete move.
    Anti-meta reject rule: reject tautological/meta commentary (e.g., "this post uses
    rhetorical techniques", "engages readers", "shows voice/style") unless tied to a
    specific observed move with evidence_span.
    If a VoiceQuality is emitted, pair it with at least one concrete move/hook signal.
    Duplicate suppression: within a single piece, do not emit repeated near-synonym
    USES_MOVE entities unless they map to distinct evidence spans.
    Emit-empty rule: if snippet is too low-signal to support at least one HookPattern
    or RhetoricalMove with evidence, return empty extraction.
    Use only ontology edges: USES_MOVE, OPENS_WITH, EXHIBITS, TRIGGERED,
    AUTHORED_BY, COMPRESSES_VIA. Do not emit generic connector edges.
  extraction_emphasis: >-
    Focus on hooks, compression, punch, and engagement triggers.
    Prioritize rhetorical moves and voice/tone over topic or thesis.
    Extract what makes short-form content effective — first-line formulas,
    compression techniques, and engagement signals.

  anchor_entity_types:
    - ShortFormPiece
  craft_required_fields:
    - evidence_span
    - craft_type
    - pattern_template
    - when_to_use
  craft_field_descriptions:
    evidence_span: "Exact quoted phrase/span from the source short-form piece proving the move."
    craft_type: "Normalized craft move category (hook, rhetorical move, compression move, voice move)."
    pattern_template: "Reusable pattern distilled from the observed move."
    when_to_use: "Concrete conditions where this pattern should be applied."

  entity_types:
    - name: ShortFormPiece
      description: "The source short-form text (tweet, post, caption) used as the anchor node for all extraction edges."
    - name: RhetoricalMove
      description: "A specific technique used in the piece (e.g. cold open with absurd analogy, one-liner callback)"
    - name: HookPattern
      description: "First-line or opening strategy (e.g. provocative question, contrarian statement, unexpected juxtaposition)"
    - name: VoiceQuality
      description: "Tone or register characteristic (e.g. irreverent-casual, deadpan-authoritative, erudite-compressed)"
    - name: EngagementSignal
      description: "What made the piece resonate or go viral (e.g. ratio bait, tribal identity signal, counterintuitive data point)"
    - name: AuthorStyle
      description: "The writer's broader style archetype (e.g. Tyler Cowen — compressed erudition, Balaji — thread-as-essay)"
    - name: CompressionTechnique
      description: "How complex ideas are compressed (e.g. metaphor substitution, assumed shared context, implication over statement)"

  relationship_types:
    - name: USES_MOVE
      description: "ShortFormPiece → RhetoricalMove"
    - name: OPENS_WITH
      description: "ShortFormPiece → HookPattern"
    - name: EXHIBITS
      description: "ShortFormPiece → VoiceQuality"
    - name: TRIGGERED
      description: "ShortFormPiece → EngagementSignal"
    - name: AUTHORED_BY
      description: "ShortFormPiece → AuthorStyle"
    - name: COMPRESSES_VIA
      description: "ShortFormPiece → CompressionTechnique"

# ─────────────────────────────────────────────
# Content Inspiration — Long-Form
# ─────────────────────────────────────────────
s1_inspiration_long_form:
  extraction_mode: constrained_soft
  intent_guidance: >-
    Focus on argument structure, narrative arc, transitions, and sustained voice patterns
    that are useful for drafting long-form writing.
    Every extraction must root from exactly one LongFormPiece anchor node per episode,
    and all relationship edges must originate from that anchor.
    Specificity requirement: avoid generic statements like "employs rhetorical strategies".
    Emit named techniques (e.g., concession-pivot, callback, inversion, escalation,
    question-bridge) with concrete supporting evidence from the text and include
    evidence_span + craft_type + pattern_template + when_to_use fields.
    Typed constraints: USES_MOVE -> RhetoricalMove; STRUCTURED_AS -> NarrativeArc or
    ArgumentStructure; TRANSITIONS_VIA -> TransitionTechnique only when a real bridge
    move is present.
    If no concrete structural/rhetorical craft is identifiable, return empty extraction
    instead of forcing generic labels.
    Anti-meta reject rule: reject prose-about-prose statements (e.g., "employs rhetorical
    strategies", "keeps readers engaged") unless grounded in explicit move evidence.
    Use only ontology edges: USES_MOVE, STRUCTURED_AS, EXHIBITS, TRANSITIONS_VIA,
    AUTHORED_BY, OPENS_WITH, TRIGGERED. Avoid generic connector edges.
  extraction_emphasis: >-
    Focus on argument structure, narrative arc, transitions, and sustained voice.
    Extract how long-form pieces build and maintain reader engagement across sections.
    Prioritize structural and rhetorical patterns over individual facts or claims.

  anchor_entity_types:
    - LongFormPiece
  craft_required_fields:
    - evidence_span
    - craft_type
    - pattern_template
    - when_to_use
  craft_field_descriptions:
    evidence_span: "Exact quoted phrase/span from long-form source proving the structural move."
    craft_type: "Normalized long-form craft category (arc, argument move, transition, opening move, voice move)."
    pattern_template: "Reusable long-form writing pattern distilled from the observed move."
    when_to_use: "Concrete draft context where this long-form pattern should be used."

  entity_types:
    - name: LongFormPiece
      description: "The source long-form text (essay, article, blog post) used as the anchor node for all extraction edges."
    - name: RhetoricalMove
      description: "Long-form technique (e.g. extended analogy across sections, dialectical pivot, callback close)"
    - name: NarrativeArc
      description: "Overall structural pattern (e.g. thesis-antithesis-synthesis, chronological buildup to reveal, nested stories)"
    - name: ArgumentStructure
      description: "How the argument is built (e.g. evidence stacking, concession-then-reframe, first-principles derivation)"
    - name: VoiceQuality
      description: "Tone or register in long-form (e.g. essayistic-intimate, academic-accessible, storyteller-with-data)"
    - name: TransitionTechnique
      description: "How sections or ideas connect (e.g. rhetorical question bridge, anecdote pivot, tempo shift)"
    - name: EngagementSignal
      description: "What made the piece resonate (e.g. shareable thesis statement, quotable paragraph, unexpected conclusion)"
    - name: AuthorStyle
      description: "Writer's archetype (e.g. Arthur Hayes — storytelling + macro thesis, Paul Graham — simple clarity)"
    - name: OpeningStrategy
      description: "Long-form hook approach (e.g. in-medias-res anecdote, bold claim first sentence, scene-setting)"

  relationship_types:
    - name: USES_MOVE
      description: "LongFormPiece → RhetoricalMove"
    - name: STRUCTURED_AS
      description: "LongFormPiece → NarrativeArc or ArgumentStructure"
    - name: EXHIBITS
      description: "LongFormPiece → VoiceQuality"
    - name: TRANSITIONS_VIA
      description: "LongFormPiece → TransitionTechnique"
    - name: AUTHORED_BY
      description: "LongFormPiece → AuthorStyle"
    - name: OPENS_WITH
      description: "LongFormPiece → OpeningStrategy"
    - name: TRIGGERED
      description: "LongFormPiece → EngagementSignal"

# ─────────────────────────────────────────────
# Writing Samples — Yuan's Own
# ─────────────────────────────────────────────
s1_writing_samples:
  extraction_mode: constrained_soft
  intent_guidance: >-
    Extract reusable author-voice primitives (style/craft), not topic summaries.
    Priority order: SignaturePhrase, RegisterMarker, VoiceFingerprint,
    StructuralPattern, ToneShift.
    Hard evidence rule: emit style entities only when grounded in explicit lexical or
    structural evidence in the current sample and include
    evidence_span + craft_type + pattern_template + when_to_use fields.
    Style-only gate: suppress topic/entity facts unless they directly evidence style.
    If style evidence is weak, emit one RegisterMarker fallback (or emit-empty if truly
    content-free).
    Quality rule: avoid generic statements (e.g., "mix of formal and casual tones")
    unless paired with concrete indicators (wording choice, syntax pattern,
    transition move, cadence shift).
    Anti-meta reject rule: reject tautological self-descriptions (e.g., "shows the
    author's voice/style") when no explicit evidence_span + pattern_template is present.
    Always emit exactly one WritingSample anchor node per episode.
    Use only ontology edges: DEMONSTRATES, FOLLOWS, SIGNALS, CONTAINS, SHIFTS_VIA,
    SIGNALS_STYLE. Never emit generic connector edges.
    Prefer canonical names over near-synonyms across episodes.
  extraction_emphasis: >-
    Extract reusable style primitives for author-voice modeling (not topic knowledge).
    Prioritize: SignaturePhrase, RegisterMarker, VoiceFingerprint, StructuralPattern, ToneShift.
    Emit only when grounded in explicit evidence. Return empty if no clear style signal.

  anchor_entity_types:
    - WritingSample
  craft_required_fields:
    - evidence_span
    - craft_type
    - pattern_template
    - when_to_use
  craft_field_descriptions:
    evidence_span: "Exact quoted phrase/span from the writing sample that proves the style signal."
    craft_type: "Normalized style/craft move category (voice fingerprint, structural move, register cue, phrase pattern)."
    pattern_template: "Reusable writing pattern distilled from this style signal."
    when_to_use: "Concrete conditions where this style pattern should be used in new drafts."

  entity_types:
    - name: WritingSample
      description: "A concrete text sample/post/message from the author used as the anchor node for style extraction."
    - name: VoiceFingerprint
      description: "Characteristic writing move unique to the author (e.g. Machiavelli-meets-f-bomb register shift, parenthetical self-deprecation)"
    - name: StructuralPattern
      description: "How the author builds or organizes (e.g. hook → context → thesis → evidence → callback, list-with-commentary)"
    - name: RegisterMarker
      description: "Signal of register level (e.g. slang density, citation formality, sentence length variation)"
    - name: SignaturePhrase
      description: "Recurring distinctive language — specific phrases, characteristic word choices, verbal tics"
    - name: ToneShift
      description: "Where or how register changes within a piece (e.g. opens casual, pivots to technical, closes with joke)"

  relationship_types:
    - name: DEMONSTRATES
      description: "WritingSample → VoiceFingerprint"
    - name: FOLLOWS
      description: "WritingSample → StructuralPattern"
    - name: SIGNALS
      description: "WritingSample → RegisterMarker"
    - name: CONTAINS
      description: "WritingSample → SignaturePhrase"
    - name: SHIFTS_VIA
      description: "WritingSample → ToneShift"
    - name: SIGNALS_STYLE
      description: "SignaturePhrase → VoiceFingerprint"

# ─────────────────────────────────────────────
# Content Strategy
# ─────────────────────────────────────────────
s1_content_strategy:
  extraction_emphasis: >-
    Focus on actionable platform knowledge and engagement mechanics.
    Extract concrete tactics, proven formulas, and anti-patterns.
    Prioritize specificity — platform-specific mechanics over generic advice.

  entity_types:
    - name: PlatformMechanic
      description: "How a platform's algorithm or system works (e.g. Twitter rewards early engagement velocity, quote tweets boost less than replies)"
    - name: HookTemplate
      description: "Proven first-line formula (e.g. Thread: Here's what nobody tells you about X, 'Unpopular opinion:' framing)"
    - name: DistributionTactic
      description: "Strategy for reach or engagement (e.g. reply to high-follower accounts within 15 min, thread with standalone first tweet)"
    - name: AntiPattern
      description: "What kills engagement or looks bad (e.g. hashtag spam, self-promotional tone, engagement bait without substance)"
    - name: AudiencePsychology
      description: "What specific audiences respond to (e.g. crypto audience rewards contrarian takes with evidence, VC audience shares builder insight content)"

  relationship_types:
    - name: EXPLOITS
      description: "Tactic → PlatformMechanic"
    - name: TARGETS
      description: "Tactic → AudiencePsychology"
    - name: COUNTERS
      description: "AntiPattern → what it prevents"
    - name: USES_HOOK
      description: "Tactic → HookTemplate"
    - name: SUPERSEDED_BY
      description: "Old mechanic → new mechanic (staleness chain)"

# ─────────────────────────────────────────────
# Engineering Learnings
# ─────────────────────────────────────────────
engineering_learnings:
  extraction_emphasis: >-
    Focus on what worked, what failed, why, and how to prevent recurrence.
    Extract specific tool behaviors, architecture decisions, and performance patterns.
    Capture root causes and remediation steps, not just symptoms.

  entity_types:
    - name: FailurePattern
      description: "What went wrong and why (e.g. FalkorDB GRAPH.QUERY on empty graph returns no rows, not error)"
    - name: SuccessPattern
      description: "What worked well (e.g. nohup + log redirect prevents CLR output-buffer SIGKILL)"
    - name: ReviewPattern
      description: "What reviewers consistently catch (e.g. missing error handling on async graph operations)"
    - name: SecurityFinding
      description: "Security-relevant discovery (e.g. content scanner missed canary phrase injection pattern)"
    - name: ToolApiBehavior
      description: "Specific tool or API quirk or gotcha (e.g. gh issue comment with backticks in zsh requires heredoc)"
    - name: ArchitectureDecision
      description: "Why we chose X over Y (e.g. chose per-group FalkorDB graphs over namespace-only segregation)"
    - name: PerformancePattern
      description: "What is slow or fast and why (e.g. long-form extraction ~3 min/episode due to dense chunk size)"
    - name: DependencyCompatibility
      description: "Library or version interaction (e.g. FalkorDB v4.16.3 doesn't support EXISTS subquery)"

  relationship_types:
    - name: CAUSED_BY
      description: "Failure → root cause"
    - name: FIXED_BY
      description: "Failure → remediation or success pattern"
    - name: PREVENTS
      description: "Pattern → future failure"
    - name: AFFECTS
      description: "ToolApiBehavior → specific tool or service"
    - name: SUPERSEDES
      description: "New learning → stale old learning"
    - name: DECIDED_BECAUSE
      description: "ArchitectureDecision → tradeoff or rationale"
    - name: CONSTRAINS
      description: "DependencyCompatibility → what it limits"

# ─────────────────────────────────────────────
# Self-Audit / Operational Learnings
# ─────────────────────────────────────────────
learning_self_audit:
  extraction_emphasis: >-
    Focus on what went wrong in assistant operations, why, and how to prevent it.
    Weight MISSes higher than HITs for entity creation priority.
    Extract concrete operational rules and remediation steps.

  entity_types:
    - name: ToolBehavior
      description: "Tool-specific operational quirk (e.g. TFL releases 2 months ahead, not 1 — Feb drop covers through March)"
    - name: OperationalRule
      description: "Process or policy that should be followed (e.g. Always use update-with-hotfixes.sh for OpenClaw updates)"
    - name: SecurityGap
      description: "Discovered security weakness in operations (e.g. Content scanner missed canary phrase injection)"
    - name: PreferenceMiss
      description: "User preference that was wrong or missed (e.g. Yuan prefers pushy instant pings, not daily digests)"
    - name: Remediation
      description: "The fix applied to prevent recurrence (e.g. Added canary pattern to content-scanner rules)"

  relationship_types:
    - name: CAUSED_BY
      description: "Gap or Miss → root cause"
    - name: FIXED_BY
      description: "Gap or Miss → Remediation"
    - name: PREVENTS
      description: "Rule or Remediation → future gap"
    - name: AFFECTS
      description: "ToolBehavior → specific tool or service"
    - name: SUPERSEDES
      description: "New learning → old stale learning"

# ─────────────────────────────────────────────
# Sessions Memory — Main + ChatGPT + FR-11 Pilot Lanes
# Finalized sessions ontology (hardened)
# ─────────────────────────────────────────────
s1_sessions_main:
  extraction_mode: constrained_soft
  intent_guidance: >-
    Use only this ontology for sessions memory.
    Allowed entity types: Person, Organization, Location, Event, Artifact, System,
    Preference, Requirement, Procedure.
    Allowed edges: PRODUCED, MODIFIED, DEPLOYED_TO, USES, INTEGRATES_WITH,
    DEPENDS_ON, LOCATED_AT, ATTENDED, PART_OF, PREFERS, REQUIRES.
    Never emit RELATES_TO, MENTIONS, DISCUSSED, or other generic connector edges.
    If no grounded edge applies, keep mention-only entities as floating nodes.
    Guardrails: Preference only stable defaults/likes; Requirement only explicit
    constraints or gates; Procedure only repeatable ordered workflows; Event only
    concrete scheduled/past happenings.
    Type aliases: Agent -> Person; Task/Ticket -> Artifact (kind=task|ticket);
    Environment -> System (kind=env).
  extraction_emphasis: >-
    Focus on durable personal/work context and operational facts with strict
    ontology-conformant edges. Prefer precision over coverage and allow floating
    entities when relations are not explicitly grounded.

  entity_types:
    - name: Person
      description: "A human actor mentioned in the transcript (user, teammate, operator, participant)."
    - name: Organization
      description: "A company, fund, DAO, team, or institution."
    - name: Location
      description: "A physical or virtual place relevant to work, meetings, or events."
    - name: Event
      description: "A concrete meeting, trip, release, incident, or scheduled/past happening."
    - name: Artifact
      description: "A tangible deliverable or digital object (doc, code change, PR, task, ticket, file, plan)."
      attributes_schema:
        kind: "Optional subtype; use task or ticket when aliasing Task/Ticket, otherwise concise artifact kind."
    - name: System
      description: "A software/service/platform/environment (tool, repo, runtime, infra component)."
      attributes_schema:
        kind: "Optional subtype; use env when aliasing Environment, otherwise concise system kind."
    - name: Preference
      description: "A stable preference or default behavior for a person/system."
    - name: Requirement
      description: "A hard requirement, constraint, non-negotiable rule, or acceptance condition."
    - name: Procedure
      description: "A repeatable multi-step process or operating workflow."

  relationship_types:
    - name: PRODUCED
      description: "Person/System/Organization -> Artifact created or authored."
    - name: MODIFIED
      description: "Person/System/Organization -> Artifact updated or edited."
    - name: DEPLOYED_TO
      description: "Artifact/System -> System/environment where it was deployed/applied."
    - name: USES
      description: "Person/Organization/System/Procedure/Artifact -> System/Artifact that is used."
    - name: INTEGRATES_WITH
      description: "System/Artifact -> System with explicit integration linkage."
    - name: DEPENDS_ON
      description: "Artifact/System/Procedure -> prerequisite System/Artifact/Procedure."
    - name: LOCATED_AT
      description: "Event/Organization/System/Person -> Location."
    - name: ATTENDED
      description: "Person -> Event attended or participated in."
    - name: PART_OF
      description: "Entity -> parent Organization/System/Artifact grouping."
    - name: PREFERS
      description: "Person/Organization/System -> Preference."
    - name: REQUIRES
      description: "Person/Organization/System/Procedure/Artifact/Event -> Requirement."

